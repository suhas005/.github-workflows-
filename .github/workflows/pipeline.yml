name: Tourism Project Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-mlops-pipeline:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: suhas005

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-github-actions.txt

      - name: Verify Hugging Face token
        run: |
          python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN secret is missing'"

      - name: Create project folders
        run: |
          mkdir -p tourism_project/data
          mkdir -p tourism_project/model_building
          mkdir -p tourism_project/deployment

      - name: Run notebook-compatible pipeline script
        run: |
          python github_actions_pipeline.py

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tourism-project-artifacts
          path: |
            tourism_project/model_building
            tourism_project/deployment
      - name: Set up Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.10"

- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements-github-actions.txt

- name: Run end-to-end MLOps pipeline
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
    HF_USERNAME: suhas005
  run: python github_actions_pipeline.py
